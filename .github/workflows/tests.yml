name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  tests:
    name: tests-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.13"   # 3.14 wheels for PyQt6 not reliable on Linux yet
          - os: windows-latest
            python-version: "3.14"   # same Python as the release build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 🖥️ Install Qt system dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libglib2.0-0 \
            libdbus-1-3 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0

      - name: 📦 Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f FF8GameData/requirements.txt ]; then pip install -r FF8GameData/requirements.txt; fi

      - name: 🧪 Run all tests
        id: pytest
        shell: bash
        run: |
          pytest . -v --tb=short --disable-warnings --junit-xml=test-results.xml || echo "tests_failed=true" >> $GITHUB_OUTPUT
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}
          QT_QPA_PLATFORM: offscreen   # ← headless Qt, no display needed
          DISPLAY: ""

      - name: 📊 Publish test results
        if: always() && runner.os == 'Linux'
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results.xml
          check_name: "Test Results"

      - name: 📤 Upload raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-xml-${{ matrix.os }}
          path: test-results.xml
          retention-days: 7

      - name: ❌ Fail workflow if tests failed
        if: steps.pytest.outputs.tests_failed == 'true'
        run: |
          echo "❌ Some tests failed! Check the test report above."
          exit 1
