name: Auto-release

on:
  push:
    branches: [ "master" ]
    tags:
      - "*"
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  release-version:
    runs-on: windows-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'true'
        fetch-depth: 0

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: recursive submodule
      shell: bash
      run: |
        git submodule update --init --recursive

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r FF8GameData/requirements.txt
        pip install -r requirements.txt
        pip install pyinstaller
        pip freeze

    - uses: milliewalky/setup-7-zip@v2

    - name: Create patcher
      shell: bash
      run: |
        mkdir -p Patcher
        pyinstaller -n Patcher -F --specpath release/build --distpath release/Patcher --noconsole --workpath release/build --onefile --icon=../../Resources/hobbitdur.ico Patcher/main.py
        rm -R release/build
        cd release
        ls -al
        cd ..

    - name: Create release
      shell: bash
      run: |
        pyinstaller -n FF8UltimateEditor -F --specpath release/build --distpath release --noconsole --workpath release/build --onefile --icon=../../Resources/hobbitdur.ico main.py
        mkdir -p release/Resources
        mkdir -p release/ExternalTools/Junkshop
        mkdir -p release/ExternalTools/Quezacotl
        mkdir -p release/ExternalTools/Doomtrain
        mkdir -p release/ExternalTools/JumboCactuar
        mkdir -p release/ExternalTools/IfritGui
        mkdir -p release/ExternalTools/Siren
        mkdir -p release/ExternalTools/Hyne
        mkdir -p release/ExternalTools/Deling
        mkdir -p release/logs
        mkdir -p release/FF8GameData
        mkdir -p release/FF8GameData/Resources
        mkdir -p release/FF8GameData/fs
        mkdir -p release/FF8GameData/fs/DelingCli
        mkdir -p release/ToolUpdate
        mkdir -p release/ShumiTranslator
        mkdir -p release/ShumiTranslator/csv
        cp -R ShumiTranslator/csv/. release/ShumiTranslator/csv
        cp ToolUpdate/list.json release/ToolUpdate/
        cp -R FF8GameData/Resources/. release/FF8GameData/Resources/
        cp -R Resources/. release/Resources/
        rm -R release/build
        cd release
        ls -al
        cd ..

    - name: Get last official tag
      id: last_tag
      shell: bash
      run: |
        LAST_OFFICIAL_TAG=$(git tag -l | grep -v "continuous" | sort -V | tail -n1 || echo "")
        echo "last_official_tag=$LAST_OFFICIAL_TAG" >> $GITHUB_OUTPUT

    - name: Generate release notes for continuous build
      if: github.event.ref_type != 'tag' && github.ref == 'refs/heads/master'
      shell: bash
      id: continuous_notes
      run: |
        LAST_TAG="${{ steps.last_tag.outputs.last_official_tag }}"
        
        if [ -z "$LAST_TAG" ]; then
          COMMITS=$(git log --pretty=format:"- **%s** (%h) - %an" -n 100 HEAD)
          AUTHORS=$(git log --pretty=format:"%an" -n 100 HEAD | sort | uniq -c | sort -rn | sed 's/^[[:space:]]*//' | sed 's/ /: /' | sed 's/^/- /')
          
          NOTES="## 🔄 Unstable Continuous Build\n\n"
          NOTES+="⚠️ **This is an automated pre-release build** ⚠️\n\n"
          NOTES+="Built from commit: \`${{ github.sha }}\`\n\n"
          NOTES+="---\n\n"
          NOTES+="### 📝 Latest Commits (showing up to 100)\n\n"
          NOTES+="$COMMITS\n\n"
          NOTES+="---\n\n"
          NOTES+="### 👥 Contributors (last 100 commits)\n\n"
          NOTES+="$AUTHORS"
        else
          COMMITS=$(git log --pretty=format:"- **%s** (%h) - %an" $LAST_TAG..HEAD)
          COMMIT_COUNT=$(git rev-list --count $LAST_TAG..HEAD)
          AUTHORS=$(git log --pretty=format:"%an" $LAST_TAG..HEAD | sort | uniq -c | sort -rn | sed 's/^[[:space:]]*//' | sed 's/ /: /' | sed 's/^/- /')
          FILES_CHANGED=$(git diff --shortstat $LAST_TAG..HEAD)
          
          NOTES="## 🔄 Unstable Continuous Build\n\n"
          NOTES+="⚠️ **This is an automated pre-release build** ⚠️\n\n"
          NOTES+="Built from commit: \`${{ github.sha }}\`\n\n"
          NOTES+="**Changes since last official release:** \`$LAST_TAG\`\n\n"
          NOTES+="---\n\n"
          NOTES+="### 📊 Summary\n\n"
          NOTES+="- **Commits:** $COMMIT_COUNT\n"
          NOTES+="- **Changes:** $FILES_CHANGED\n\n"
          NOTES+="---\n\n"
          NOTES+="### 📝 Commit History\n\n"
          NOTES+="$COMMITS\n\n"
          NOTES+="---\n\n"
          NOTES+="### 👥 Contributors\n\n"
          NOTES+="$AUTHORS"
        fi
        
        echo "release_notes<<EOF" >> $GITHUB_OUTPUT
        echo -e "$NOTES" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Generate release notes for official release
      if: startsWith(github.ref, 'refs/tags/')
      shell: bash
      id: official_notes
      run: |
        CURRENT_TAG="${{ github.ref_name }}"
        PREVIOUS_TAG=$(git tag -l | grep -v "continuous" | sort -V | tail -n2 | head -n1 || echo "")
        
        if [ -z "$PREVIOUS_TAG" ]; then
          COMMITS=$(git log --pretty=format:"- **%s** (%h) - %an" -n 100 HEAD)
          AUTHORS=$(git log --pretty=format:"%an" -n 100 HEAD | sort | uniq -c | sort -rn | sed 's/^[[:space:]]*//' | sed 's/ /: /' | sed 's/^/- /')
          
          NOTES="## 🎉 Official Release: $CURRENT_TAG 🎉\n\n"
          NOTES+="### 📦 First Stable Release!\n\n"
          NOTES+="---\n\n"
          NOTES+="### 📝 All Commits (showing up to 100)\n\n"
          NOTES+="$COMMITS\n\n"
          NOTES+="---\n\n"
          NOTES+="### 👥 Contributors\n\n"
          NOTES+="$AUTHORS"
        else
          COMMITS=$(git log --pretty=format:"- **%s** (%h) - %an" $PREVIOUS_TAG..$CURRENT_TAG)
          COMMIT_COUNT=$(git rev-list --count $PREVIOUS_TAG..$CURRENT_TAG)
          AUTHORS=$(git log --pretty=format:"%an" $PREVIOUS_TAG..$CURRENT_TAG | sort | uniq -c | sort -rn | sed 's/^[[:space:]]*//' | sed 's/ /: /' | sed 's/^/- /')
          FILES_CHANGED=$(git diff --shortstat $PREVIOUS_TAG..$CURRENT_TAG)
          
          NOTES="## 🎉 Official Release: $CURRENT_TAG 🎉\n\n"
          NOTES+="### 📦 Stable Release\n\n"
          NOTES+="**Changes since:** \`$PREVIOUS_TAG\`\n\n"
          NOTES+="---\n\n"
          NOTES+="### 📊 Summary\n\n"
          NOTES+="- **Commits:** $COMMIT_COUNT\n"
          NOTES+="- **Changes:** $FILES_CHANGED\n\n"
          NOTES+="---\n\n"
          NOTES+="### 📝 Commit History\n\n"
          NOTES+="$COMMITS\n\n"
          NOTES+="---\n\n"
          NOTES+="### 👥 Contributors\n\n"
          NOTES+="$AUTHORS"
        fi
        
        echo "release_notes<<EOF" >> $GITHUB_OUTPUT
        echo -e "$NOTES" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: zip name continuous
      shell: bash
      if: github.event.ref_type != 'tag' && github.ref == 'refs/heads/master'
      run: |
        cd release
        7z a -tzip "FF8UltimateEditor-continuous-${{ github.sha }}.zip" .
        cd ..

    - name: zip name tag
      shell: bash
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        cd release
        7z a -tzip "FF8UltimateEditor-${{ github.ref_name }}.zip" .
        cd ..

    - name: Delete old continuous release assets
      if: github.event.ref_type != 'tag' && github.ref == 'refs/heads/master'
      uses: actions/github-script@v7
      with:
        script: |
          const { data: releases } = await github.rest.repos.listReleases({
            owner: context.repo.owner,
            repo: context.repo.repo,
          });
          
          const continuousRelease = releases.find(release => release.tag_name === 'continuous');
          
          if (continuousRelease && continuousRelease.assets.length > 0) {
            for (const asset of continuousRelease.assets) {
              console.log(`Deleting old asset: ${asset.name}`);
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: asset.id,
              });
            }
            console.log(`Deleted ${continuousRelease.assets.length} old asset(s)`);
          } else {
            console.log('No existing continuous release or no assets found');
          }

    - name: Update continuous release date to now
      if: github.event.ref_type != 'tag' && github.ref == 'refs/heads/master'
      uses: actions/github-script@v7
      with:
        script: |
          const { data: releases } = await github.rest.repos.listReleases({
            owner: context.repo.owner,
            repo: context.repo.repo,
          });
          
          const continuousRelease = releases.find(release => release.tag_name === 'continuous');
          
          if (continuousRelease) {
            // Update the release to make it appear recent but not override the latest official release
            // We'll update its published date to now, but mark it as prerelease
            // GitHub always shows latest release first, then other releases by date
            // Since this is a prerelease, it will appear after the latest official release
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: continuousRelease.id,
              prerelease: true,  // Ensure it's marked as prerelease
              // Don't change the tag or name, just ensure it's a prerelease
            });
            console.log('Updated continuous release to ensure it stays as prerelease');
          }

    - name: Deploy Package (Continuous)
      if: github.event.ref_type != 'tag' && github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v1
      with:
        token: "${{ secrets.GITHUB_TOKEN }}"
        tag_name: "continuous"
        name: "🔄 Unstable Build - Continuous (Latest Dev)"
        body: ${{ steps.continuous_notes.outputs.release_notes }}
        prerelease: true
        files: |
          release/FF8UltimateEditor-continuous-*.zip
        generate_release_notes: false
        make_latest: false  # This prevents it from being marked as the "Latest" release

    - name: Deploy tag Package (Official)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        token: "${{ secrets.GITHUB_TOKEN }}"
        tag_name: ${{ github.ref_name }}
        name: "🎉 FF8UltimateEditor-${{ github.ref_name }}"
        body: ${{ steps.official_notes.outputs.release_notes }}
        prerelease: false
        files: |
          release/FF8UltimateEditor-*.zip
        generate_release_notes: false