name: Auto-release

on:
  push:
    branches: [ "master" ]
    tags:
      - "*"
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  release-version:
    runs-on: windows-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: 'true'
        fetch-depth: 0
    - name: Fetch full annotated tag object
      if: startsWith(github.ref, 'refs/tags/')
      shell: bash
      run: |
        git fetch origin "refs/tags/${{ github.ref_name }}:refs/tags/${{ github.ref_name }}" --force
    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"

    - name: recursive submodule
      shell: bash
      run: |
        git submodule update --init --recursive

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r FF8GameData/requirements.txt
        pip install -r requirements.txt
        pip install pyinstaller
        pip freeze

    - uses: milliewalky/setup-7-zip@v2

    - name: Create patcher
      shell: bash
      run: |
        mkdir -p Patcher
        pyinstaller -n Patcher -F --specpath release/build --distpath release/Patcher --noconsole --workpath release/build --onefile --icon=../../Resources/hobbitdur.ico Patcher/main.py
        rm -R release/build
        cd release
        ls -al
        cd ..

    - name: Create release
      shell: bash
      run: |
        pyinstaller -n FF8UltimateEditor -F --specpath release/build --distpath release --noconsole --workpath release/build --onefile --icon=../../Resources/hobbitdur.ico main.py
        mkdir -p release/Resources
        mkdir -p release/ExternalTools/Junkshop
        mkdir -p release/ExternalTools/Quezacotl
        mkdir -p release/ExternalTools/Doomtrain
        mkdir -p release/ExternalTools/JumboCactuar
        mkdir -p release/ExternalTools/IfritGui
        mkdir -p release/ExternalTools/Siren
        mkdir -p release/ExternalTools/Hyne
        mkdir -p release/ExternalTools/Deling
        mkdir -p release/logs
        mkdir -p release/FF8GameData
        mkdir -p release/FF8GameData/Resources
        mkdir -p release/FF8GameData/fs
        mkdir -p release/FF8GameData/fs/DelingCli
        mkdir -p release/ToolUpdate
        mkdir -p release/ShumiTranslator
        mkdir -p release/ShumiTranslator/csv
        cp -R ShumiTranslator/csv/. release/ShumiTranslator/csv
        cp ToolUpdate/list.json release/ToolUpdate/
        cp -R FF8GameData/Resources/. release/FF8GameData/Resources/
        cp -R Resources/. release/Resources/
        rm -R release/build
        cd release
        ls -al
        cd ..

    - name: Create CLI release
      shell: bash
      run: |
        mkdir -p release-cli
        mkdir -p release-cli/Cli
        mkdir -p release-cli/FF8GameData
        mkdir -p release-cli/FF8GameData/Resources
        cp cli.py release-cli/
        cp -R Cli/. release-cli/Cli/
        cp requirements.txt release-cli/
        cp -R FF8GameData/Resources/. release-cli/FF8GameData/Resources/
        cp -R FF8GameData/*.py release-cli/FF8GameData/ || true
        cp -R FF8GameData/dat release-cli/FF8GameData/ || true
        cp -R FF8GameData/ExeSection release-cli/FF8GameData/ || true
        cp -R FF8GameData/FF8HexReader release-cli/FF8GameData/ || true
        cp -R FF8GameData/fs release-cli/FF8GameData/ || true
        cp -R FF8GameData/GenericSection release-cli/FF8GameData/ || true
        cp -R FF8GameData/m00x release-cli/FF8GameData/ || true
        cp -R FF8GameData/Resources release-cli/FF8GameData/ || true
        cp CLI_ARCHITECTURE.md release-cli/ || true
        cp CLI_QUICK_START.md release-cli/ || true
        cp IMPLEMENTATION_SUMMARY.md release-cli/ || true
        cp README.md release-cli/ || true
        mkdir -p release-cli/ShumiTranslator
        cp -R ShumiTranslator/model release-cli/ShumiTranslator/ || true
        cp -R ShumiTranslator/csv release-cli/ShumiTranslator/ || true
        cp -R ShumiTranslator/*.py release-cli/ShumiTranslator/ || true
        cd release-cli
        ls -al
        cd ..

    - name: Parse version and find previous relevant tag
      id: version_info
      if: startsWith(github.ref, 'refs/tags/')
      shell: bash
      run: |
        CURRENT_TAG="${{ github.ref_name }}"
        
        # Parse version numbers (X.Y.Z)
        MAJOR=$(echo $CURRENT_TAG | cut -d. -f1)
        MINOR=$(echo $CURRENT_TAG | cut -d. -f2)
        PATCH=$(echo $CURRENT_TAG | cut -d. -f3)
        
        echo "current_major=$MAJOR" >> $GITHUB_OUTPUT
        echo "current_minor=$MINOR" >> $GITHUB_OUTPUT
        echo "current_patch=$PATCH" >> $GITHUB_OUTPUT
        
        # Get tag message/annotation
        TAG_MESSAGE=$(git cat-file -p "refs/tags/$CURRENT_TAG" | awk 'f; /^$/{f=1}')
        echo "tag_message<<EOF" >> $GITHUB_OUTPUT
        echo "$TAG_MESSAGE" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
        # Find previous relevant tag based on version increment type
        ALL_TAGS=$(git tag -l | grep -v "continuous" | sort -V)
        
        PREVIOUS_TAG=""
        
        # Check if this is a patch release (only Z increased)
        PREVIOUS_PATCH=$(echo "$ALL_TAGS" | grep "^$MAJOR\.$MINOR\." | sort -V | tail -n2 | head -n1 || echo "")
        
        if [ -n "$PREVIOUS_PATCH" ] && [ "$PREVIOUS_PATCH" != "$CURRENT_TAG" ]; then
          PREVIOUS_TAG="$PREVIOUS_PATCH"
          echo "release_type=patch" >> $GITHUB_OUTPUT
          echo "previous_tag=$PREVIOUS_TAG" >> $GITHUB_OUTPUT
        else
          # Check if this is a minor release (Y increased)
          PREVIOUS_MINOR=$(echo "$ALL_TAGS" | grep "^$MAJOR\." | grep -v "^$MAJOR\.$MINOR\." | sort -V | tail -n1 || echo "")
          
          if [ -n "$PREVIOUS_MINOR" ]; then
            PREVIOUS_TAG="$PREVIOUS_MINOR"
            echo "release_type=minor" >> $GITHUB_OUTPUT
            echo "previous_tag=$PREVIOUS_TAG" >> $GITHUB_OUTPUT
          else
            # This is a major release (X increased) or first release
            PREVIOUS_MAJOR=$(echo "$ALL_TAGS" | grep -v "^$MAJOR\." | sort -V | tail -n1 || echo "")
            
            if [ -n "$PREVIOUS_MAJOR" ]; then
              PREVIOUS_TAG="$PREVIOUS_MAJOR"
              echo "release_type=major" >> $GITHUB_OUTPUT
              echo "previous_tag=$PREVIOUS_TAG" >> $GITHUB_OUTPUT
            else
              echo "release_type=first" >> $GITHUB_OUTPUT
              echo "previous_tag=" >> $GITHUB_OUTPUT
            fi
          fi
        fi

    - name: Generate release notes for official release
      if: startsWith(github.ref, 'refs/tags/')
      shell: bash
      id: official_notes
      run: |
        CURRENT_TAG="${{ github.ref_name }}"
        RELEASE_TYPE="${{ steps.version_info.outputs.release_type }}"
        PREVIOUS_TAG="${{ steps.version_info.outputs.previous_tag }}"
        TAG_MESSAGE="${{ steps.version_info.outputs.tag_message }}"
        
        case "$RELEASE_TYPE" in
          patch)
            COMMITS=$(git log --pretty=format:"- **%s** (%h) - [@%an](https://github.com/%an)" $PREVIOUS_TAG..$CURRENT_TAG)
            
            NOTES=""
            
            if [ -n "$TAG_MESSAGE" ]; then
              NOTES+="### 🎯 Main Features\n\n"
              NOTES+="$TAG_MESSAGE\n\n"
            fi
            
            NOTES+="**Changes since:** \`$PREVIOUS_TAG\`\n\n"
            NOTES+="### 🐞 Bug Fixes & Improvements\n\n"
            NOTES+="$COMMITS"
            ;;
          minor)
            COMMITS=$(git log --pretty=format:"- **%s** (%h) - [@%an](https://github.com/%an)" $PREVIOUS_TAG..$CURRENT_TAG)
            FEAT_COMMITS=$(git log --pretty=format:"- **%s** (%h) - [@%an](https://github.com/%an)" $PREVIOUS_TAG..$CURRENT_TAG | grep -i "^feat\|^feature\|^add" || echo "")
            BUG_COMMITS=$(git log --pretty=format:"- **%s** (%h) - [@%an](https://github.com/%an)" $PREVIOUS_TAG..$CURRENT_TAG | grep -i "^fix\|^bug\|^hotfix" || echo "")
            
            NOTES=""
            
            if [ -n "$TAG_MESSAGE" ]; then
              NOTES+="### 🎯 Main Features\n\n"
              NOTES+="$TAG_MESSAGE\n\n"
            fi
            
            NOTES+="**Changes since:** \`$PREVIOUS_TAG\`\n\n"
            
            if [ -n "$FEAT_COMMITS" ]; then
              NOTES+="### ✨ New Features\n\n"
              NOTES+="$FEAT_COMMITS\n\n"
            fi
            
            if [ -n "$BUG_COMMITS" ]; then
              NOTES+="### 🐞 Bug Fixes\n\n"
              NOTES+="$BUG_COMMITS\n\n"
            fi
            
            NOTES+="### 📝 All Changes\n\n"
            NOTES+="$COMMITS"
            ;;
          major)
            COMMITS=$(git log --pretty=format:"- **%s** (%h) - [@%an](https://github.com/%an)" $PREVIOUS_TAG..$CURRENT_TAG)
            
            NOTES="⚠️ **This release contains breaking changes!** ⚠️\n\n"
            
            if [ -n "$TAG_MESSAGE" ]; then
              NOTES+="### 🎯 Main Features\n\n"
              NOTES+="$TAG_MESSAGE\n\n"
            fi
            
            NOTES+="**Changes since:** \`$PREVIOUS_TAG\`\n\n"
            NOTES+="### 🔥 Breaking Changes & All Updates\n\n"
            NOTES+="$COMMITS"
            ;;
          first)
            COMMITS=$(git log --pretty=format:"- **%s** (%h) - [@%an](https://github.com/%an)" -n 100 HEAD)
            
            NOTES=""
            
            if [ -n "$TAG_MESSAGE" ]; then
              NOTES+="### 🎯 Main Features\n\n"
              NOTES+="$TAG_MESSAGE\n\n"
            fi
            
            NOTES+="### 📝 All Commits (showing up to 100)\n\n"
            NOTES+="$COMMITS"
            ;;
        esac
        
        echo "release_notes<<EOF" >> $GITHUB_OUTPUT
        echo -e "$NOTES" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Generate release notes for continuous build
      if: github.event.ref_type != 'tag' && github.ref == 'refs/heads/master'
      shell: bash
      id: continuous_notes
      run: |
        LAST_TAG=$(git tag -l | grep -v "continuous" | sort -V | tail -n1 || echo "")
        
        SHORT_SHA="${{ github.sha }}"
        SHORT_SHA=${SHORT_SHA:0:7}
        
        if [ -z "$LAST_TAG" ]; then
          COMMITS=$(git log --pretty=format:"- **%s** (%h) - [@%an](https://github.com/%an)" -n 100 HEAD)
          
          NOTES="⚠️ **This is an automated pre-release build** ⚠️\n\n"
          NOTES+="### 📝 Latest Commits (showing up to 100)\n\n"
          NOTES+="$COMMITS"
        else
          COMMITS=$(git log --pretty=format:"- **%s** (%h) - [@%an](https://github.com/%an)" $LAST_TAG..HEAD)
          
          NOTES="⚠️ **This is an automated pre-release build** ⚠️\n\n"
          NOTES+="**Changes since last official release:** \`$LAST_TAG\`\n\n"
          NOTES+="### 📝 Commit History\n\n"
          NOTES+="$COMMITS"
        fi
        
        echo "release_notes<<EOF" >> $GITHUB_OUTPUT
        echo -e "$NOTES" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

    - name: zip name continuous
      shell: bash
      if: github.event.ref_type != 'tag' && github.ref == 'refs/heads/master'
      run: |
        cd release
        7z a -tzip "FF8UltimateEditor-continuous-${{ steps.continuous_notes.outputs.short_sha }}.zip" .
        cd ..

    - name: zip CLI name continuous
      shell: bash
      if: github.event.ref_type != 'tag' && github.ref == 'refs/heads/master'
      run: |
        cd release-cli
        7z a -tzip "FF8UltimateEditor-cli-continuous-${{ steps.continuous_notes.outputs.short_sha }}.zip" .
        cd ..
        mv release-cli/*.zip release/

    - name: zip name tag
      shell: bash
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        cd release
        7z a -tzip "FF8UltimateEditor-${{ github.ref_name }}.zip" .
        cd ..

    - name: zip CLI name tag
      shell: bash
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        cd release-cli
        7z a -tzip "FF8UltimateEditor-cli-${{ github.ref_name }}.zip" .
        cd ..
        mv release-cli/*.zip release/

    - name: Delete old continuous release assets
      if: github.event.ref_type != 'tag' && github.ref == 'refs/heads/master'
      uses: actions/github-script@v7
      with:
        script: |
          const { data: releases } = await github.rest.repos.listReleases({
            owner: context.repo.owner,
            repo: context.repo.repo,
          });
          
          const continuousRelease = releases.find(release => release.tag_name === 'continuous');
          
          if (continuousRelease && continuousRelease.assets.length > 0) {
            for (const asset of continuousRelease.assets) {
              console.log(`Deleting old asset: ${asset.name}`);
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: asset.id,
              });
            }
            console.log(`Deleted ${continuousRelease.assets.length} old asset(s)`);
          } else {
             console.log('No existing continuous release or no assets found');
           }

    - name: Deploy Package (Continuous)
      if: github.event.ref_type != 'tag' && github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v1
      with:
        token: "${{ secrets.GITHUB_TOKEN }}"
        tag_name: "continuous"
        name: "FF8UltimateEditor-continuous"
        body: ${{ steps.continuous_notes.outputs.release_notes }}
        prerelease: true
        files: |
          release/FF8UltimateEditor-continuous-*.zip
          release/FF8UltimateEditor-cli-continuous-*.zip
        generate_release_notes: false
        make_latest: false

    - name: Deploy tag Package (Official)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        token: "${{ secrets.GITHUB_TOKEN }}"
        tag_name: ${{ github.ref_name }}
        name: "FF8UltimateEditor-${{ github.ref_name }}"
        body: ${{ steps.official_notes.outputs.release_notes }}
        prerelease: false
        files: |
          release/FF8UltimateEditor-*.zip
          release/FF8UltimateEditor-cli-*.zip
        generate_release_notes: false
