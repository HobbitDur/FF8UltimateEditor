name: 🧪 Test Suite Complete

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  tests:
    name: Run all Python tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 🧪 Run all tests (continue on error)
        run: |
          pytest . -v \
            --tb=short \
            --disable-warnings \
            --continue-on-collection-errors
        continue-on-error: true  # This continues the workflow even if tests fail

      - name: 📊 Upload test results
        if: always()  # Runs even if previous step failed
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/test-results.xml
            **/.pytest_cache/
          retention-days: 7

      - name: ✅ Show summary (always runs)
        if: always()
        run: |
          echo "## 📋 Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tests completed. Check the artifacts for full details." >> $GITHUB_STEP_SUMMARY