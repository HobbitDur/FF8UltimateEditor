name: Autotest

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  tests:
    name: run-all-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'       # 3.14 is pre-release; 3.13 is safer for PyQt6

      - name: 🖥️ Install Qt system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libglib2.0-0 \
            libdbus-1-3 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0

      - name: 📦 Install dependencies
        run: |
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 🧪 Run all tests
        id: pytest
        run: |
          pytest . -v --tb=short --disable-warnings --junit-xml=test-results.xml || echo "tests_failed=true" >> $GITHUB_OUTPUT
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}
          QT_QPA_PLATFORM: offscreen   # ← headless Qt, no display needed
          DISPLAY: ""

      - name: 📊 Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-results.xml
          check_name: "Autotest Results"

      - name: 📤 Upload raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-xml
          path: test-results.xml
          retention-days: 7

      - name: ❌ Fail workflow if tests failed
        if: steps.pytest.outputs.tests_failed == 'true'
        run: |
          echo "❌ Some tests failed! Check the test report above."
          exit 1