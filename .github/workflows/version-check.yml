name: 🧪 Test Suite Complete

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  tests:
    name: Run all Python tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: 📦 Install dependencies
        run: |
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 🧪 Run all tests (continue to collect all failures)
        id: pytest
        run: |
          pytest . -v --tb=short --disable-warnings --junit-xml=test-results.xml || echo "tests_failed=true" >> $GITHUB_OUTPUT
        continue-on-error: true  # ← CHANGE THIS to true
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: 📊 Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/test-*.xml
            .pytest_cache/

      - name: ❌ Fail workflow if tests failed
        if: steps.pytest.outputs.tests_failed == 'true'
        run: |
          echo "❌ Some tests failed! Check the artifacts."
          exit 1